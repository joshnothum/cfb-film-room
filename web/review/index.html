<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Reviewer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Play Reviewer</h1>
      <div class="status" id="status">Loading plays...</div>
    </header>

    <main class="layout">
      <aside class="panel list-panel">
        <div class="panel-head">
          <h2>Plays</h2>
          <div class="list-controls">
            <input id="search" type="search" placeholder="Filter by play_id or game_id" />
            <div class="filter-row">
              <select id="reviewFilter" aria-label="Filter by review status">
                <option value="all">All reviews</option>
                <option value="pending">Pending only</option>
                <option value="reviewed">Reviewed only</option>
              </select>
              <select id="playTypeFilter" aria-label="Filter by play type">
                <option value="all">All play types</option>
                <option value="run">Run</option>
                <option value="pass">Pass</option>
                <option value="rpo">RPO</option>
                <option value="kick">Kick</option>
              </select>
            </div>
          </div>
        </div>
        <ul id="playList" class="play-list"></ul>
      </aside>

      <section class="panel fields-panel">
        <div class="panel-head">
          <h2 id="detailTitle">Details</h2>
          <div class="actions">
            <button id="editBtn" type="button">Edit</button>
            <button id="saveBtn" type="button" disabled>Save</button>
            <button id="resetBtn" type="button" disabled>Reset</button>
          </div>
        </div>
        <form id="detailForm" class="detail-form"></form>
      </section>

      <section class="panel video-panel">
        <div class="panel-head">
          <h2>Media</h2>
        </div>
        <img id="playImage" alt="Play art" />
        <video id="video" controls playsinline preload="metadata"></video>
        <div id="mediaHint" class="media-hint">No clip or play art available for this row.</div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
